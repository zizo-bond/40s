        :root {
            --bg: #f8f5f0;
            --card-bg: #ffffff;

            --text-light: #6b5e4f;
            --accent: #8b5a2b;
            --accent-hover: #a66b35;
            --border: #d9cfc0;
            --shadow: 0 4px 12px rgba(44, 36, 27, 0.08);
            --radius: 12px;
            --font-main: 'Tajawal', sans-serif;

        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #e8e0d5, #d4c9b8);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }

        header h1 {
            font-family: var(--font-serif);
            font-size: 2.2rem;
            color: var(--text);
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-light);
            font-size: 1rem;
        }

        .controls {
            max-width: 1200px;
            margin: 1.5rem auto;
            padding: 0 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            padding: 0.8rem 1rem;
            font-family: var(--font-main);
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--card-bg);
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filters {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        select {
            padding: 0.8rem;
            font-family: var(--font-main);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--card-bg);
            cursor: pointer;
        }

        .grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.2rem;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.2rem;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(44, 36, 27, 0.12);
        }

        .card h3 {
            font-family: var(--font-serif);
            font-size: 1.3rem;
            color: var(--accent);
        }

        .card .pron {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .card .brief {
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.4rem;
        }

        .tag {
            background: #f0e9df;
            color: var(--accent);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: var(--radius);
            padding: 1.5rem;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .close-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .close-btn:hover {
            color: var(--accent);
        }

        .modal h2 {
            font-family: var(--font-serif);
            color: var(--accent);
            margin-bottom: 1rem;
        }

        .detail-row {
            margin-bottom: 1rem;
            border-bottom: 1px dashed var(--border);
            padding-bottom: 0.8rem;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .label {
            font-weight: 600;
            color: var(--text);
            display: block;
            margin-bottom: 0.3rem;
        }

        .value {
            color: var(--text-light);
            line-height: 1.6;
        }

        .example {
            background: #f4f0ea;
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .stats {
            text-align: center;
            padding: 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.6rem;
            }

                flex-direction: column;
                align-items: stretch;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

    <script>

        // 🛠️ عناصر DOM
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('search');
        const filterCategory = document.getElementById('filter-category');
        const filterClass = document.getElementById('filter-class');
        const filterRegion = document.getElementById('filter-region');
        const stats = document.getElementById('stats');
        const modal = document.getElementById('modal');
        const modalBody = document.getElementById('modal-body');
        const closeModalBtn = document.getElementById('close-modal');

        // 🔍 دالة التصفية والعرض
        function renderTerms() {
            const query = searchInput.value.toLowerCase().trim();
            const cat = filterCategory.value;
            const cls = filterClass.value;
            const reg = filterRegion.value;

            const filtered = terms.filter(t => {
                const matchSearch = !query ||
                    t.term.toLowerCase().includes(query) ||
                    t.literal_meaning.toLowerCase().includes(query) ||
                    t.example.toLowerCase().includes(query) ||
                    t.historical_usage.toLowerCase().includes(query);
                const matchCat = !cat || t.category === cat;
                const matchClass = !cls || t.social_class.includes(cls);
                const matchRegion = !reg || t.region.includes(reg);
                return matchSearch && matchCat && matchClass && matchRegion;
            });

            grid.innerHTML = '';
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#6b5e4f; padding:2rem;">لا توجد نتائج مطابقة. جرّب كلمة أخرى أو عدّل الفلاتر.</p>';
                stats.textContent = `عرض 0 من ${terms.length} مصطلح`;
                return;
            }

            filtered.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
        <h3>${t.term}</h3>
        <span class="pron">${t.pronunciation}</span>
        <p class="brief">${t.literal_meaning}</p>
        <div class="tags">
          <span class="tag">${t.category}</span>
          <span class="tag">${t.social_class}</span>
          <span class="tag">${t.region}</span>
        </div>
      `;
                card.addEventListener('click', () => openModal(t));
                grid.appendChild(card);
            });

            stats.textContent = `عرض ${filtered.length} من ${terms.length} مصطلح`;
        }

        // 📖 فتح النافذة المنبثقة
        function openModal(term) {
            modalBody.innerHTML = `
      <h2>${term.term} <span style="font-size:0.9em; color:#6b5e4f; font-weight:400">(${term.pronunciation})</span></h2>
      <div class="detail-row"><span class="label">المعنى الحرفي:</span><span class="value">${term.literal_meaning}</span></div>
      <div class="detail-row"><span class="label">الاستخدام التاريخي:</span><span class="value">${term.historical_usage}</span></div>
      <div class="detail-row"><span class="label">مثال من الأربعينيات:</span><div class="example">«${term.example}»</div></div>
      <div class="detail-row"><span class="label">المقابل الحديث:</span><span class="value">${term.modern_equivalent}</span></div>
      <div class="detail-row"><span class="label">ملاحظات تاريخية:</span><span class="value">${term.notes}</span></div>
      <div class="detail-row"><span class="label">المصدر الموثق:</span><span class="value">${term.source}</span></div>
      <div class="tags" style="margin-top:1rem;">
        <span class="tag">${term.category}</span>
        <span class="tag">${term.social_class}</span>
        <span class="tag">${term.region}</span>
        <span class="tag" style="background:#e8e0d5; color:#5a4a3a;">الندرة: ${term.rarity}</span>
      </div>
    `;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // 🎛️ ربط الأحداث
        let debounceTimer;
        searchInput.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(renderTerms, 200);
        });

        [filterCategory, filterClass, filterRegion].forEach(el => {
            el.addEventListener('change', renderTerms);
        });

        closeModalBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // 🚀 التشغيل الأولي
        renderTerms();
    </script>
